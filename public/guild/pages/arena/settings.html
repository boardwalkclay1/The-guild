<div class="settings-screen">

  <header class="screen-header">
    <h2>Settings</h2>
  </header>

  <section class="settings-section">

    <div class="setting-block">
      <label>Theme</label>
      <select id="setting-theme" class="guild-select">
        <option value="dark">Dark Gold</option>
        <option value="black">Black Gold</option>
        <option value="ember">Ember</option>
        <option value="parchment">Parchment</option>
      </select>
    </div>

    <div class="setting-block">
      <label>Default Watchlist</label>
      <select id="setting-default-wl" class="guild-select"></select>
    </div>

    <div class="setting-block">
      <label>Assistant Mode</label>
      <select id="setting-assistant" class="guild-select">
        <option value="btc">BTC</option>
        <option value="tech">Tech</option>
        <option value="war">War</option>
        <option value="energy">Energy</option>
      </select>
    </div>

    <div class="setting-block">
      <label>Data Refresh Speed</label>
      <select id="setting-refresh" class="guild-select">
        <option value="fast">Fast (1s)</option>
        <option value="normal">Normal (3s)</option>
        <option value="slow">Slow (5s)</option>
      </select>
    </div>

  </section>

</div>
