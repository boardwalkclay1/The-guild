<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Success</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
  body {
    background: #000;
    color: #D4AF37;
    font-family: system-ui, sans-serif;
    text-align: center;
    padding: 40px 20px;
  }
</style>

</head>
<body>

<h2>Verifying Your Access…</h2>
<p style="opacity:0.7;">Do not close this page.</p>

<script>
// -------------------------------
// IndexedDB: Permanent Guild Access
// -------------------------------
const DB_NAME = "guild_access_db";
const STORE = "access_store";

function openDB() {
  return new Promise((resolve, reject) => {
    const req = indexedDB.open(DB_NAME, 1);

    req.onupgradeneeded = e => {
      const db = e.target.result;
      if (!db.objectStoreNames.contains(STORE)) {
        db.createObjectStore(STORE, { keyPath: "id" });
      }
    };

    req.onsuccess = e => resolve(e.target.result);
    req.onerror = () => reject("DB error");
  });
}

async function saveAccess() {
  const db = await openDB();
  const tx = db.transaction(STORE, "readwrite");
  const store = tx.objectStore(STORE);

  const record = {
    id: "device",
    unlocked: true,
    unlocked_at: Date.now(),
    forever: true
  };

  store.put(record);

  tx.oncomplete = () => {
    // Also mirror to localStorage for fast checks
    localStorage.setItem("guild_member", "paid");
    localStorage.setItem("guild_role", "member");
    localStorage.setItem("guild_unlock_until", "forever");

    window.location.href = "/guild/pages/guild.html";
  };
}

saveAccess();
</script>

</body>
</html>
