<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Guild Live – Bitcoin Arena</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <link href="https://fonts.googleapis.com/css2?family=Uncial+Antiqua&family=Marcellus+SC&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/assets/css/guild-live.css">
</head>
<body>

  <header class="live-header">
    <h1>Bitcoin Arena</h1>
    <p>Live Bitcoin and its primary war party.</p>
  </header>

  <!-- FULL BTC CHART -->
  <section class="btc-main">
    <h2>BTCUSDT – Live</h2>
    <div class="chart-wrap">
      <iframe
        src="https://s.tradingview.com/widgetembed/?symbol=BINANCE:BTCUSDT&interval=5&theme=dark&symboledit=1&saveimage=0&toolbarbg=0&studies=[]&hideideas=1"
        frameborder="0"
        class="full-chart">
      </iframe>
    </div>
  </section>

  <!-- BTC‑LINKED GRID -->
  <section class="btc-linked">
    <h2>Bitcoin‑Linked Names</h2>
    <div class="ticker-grid">

      <!-- MSTR -->
      <div class="ticker-card">
        <div class="ticker-header">
          <span class="ticker-symbol">MSTR</span>
          <span class="ticker-name">MicroStrategy</span>
        </div>
        <iframe
          src="https://s.tradingview.com/widgetembed/?symbol=NASDAQ:MSTR&interval=5&theme=dark&hideideas=1"
          frameborder="0"
          class="mini-chart">
        </iframe>
        <button class="options-btn" onclick="openOptions('MSTR')">
          Options Chain
        </button>
      </div>

  <script>
    function openOptions(symbol) {
      // Point this to wherever you actually check options.
      // For now, this is a generic placeholder pattern.
      const url = "https://www.barchart.com/stocks/quotes/" +
                  encodeURIComponent(symbol) +
                  "/options";
      window.open(url, "_blank");
    }
  </script>
