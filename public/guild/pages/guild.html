<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>THE GUILD HALL</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <link rel="icon" type="image/png" href="../the-guild.png">
  <link rel="apple-touch-icon" href="../the-guild.png">

  <link href="https://fonts.googleapis.com/css2?family=Uncial+Antiqua&family=Marcellus+SC&display=swap" rel="stylesheet">

  <!-- Correct Cloudflare Pages paths -->
  <link rel="stylesheet" href="guild-style.css">
  <script src="guild-engine.js" defer></script>
</head>

<body data-bg="Hall.jpg">

  <!-- =============================== -->
  <!-- ⭐ TOP NAV BAR ⭐ -->
  <!-- =============================== -->
  <header class="guild-top-bar">

    <div class="guild-logo-title">
      <span class="guild-mark">⛨</span>
      <span class="guild-title">THE GUILD</span>
    </div>

    <nav class="guild-nav-links">

      <button class="nav-btn" onclick="go('golden-rules.html')">Golden Rules</button>
      <button class="nav-btn" onclick="go('guild-discipline.html')">Guild Discipline</button>
      <button class="nav-btn" onclick="go('glossary.html')">Glossary</button>

      <!-- Golden Formula dropdown -->
      <div class="nav-dropdown">
        <button class="nav-btn formula-btn">Golden Formula ▾</button>
        <div class="nav-dropdown-content">
          <button onclick="go('golden-formula.html')">View Formula</button>
          <button onclick="go('training-hall.html')">Formula Training</button>
        </div>
      </div>

    </nav>
  </header>

  <!-- CINEMATIC LAYERS -->
  <div class="fog-layer"></div>
  <div class="pillar pillar-left"></div>
  <div class="pillar pillar-right"></div>

  <!-- TITLE -->
  <div class="gold-scroll open">
    <h1 class="scroll-title">THE GUILD HALL</h1>
  </div>

  <!-- =============================== -->
  <!-- ⭐ MAIN BUTTON STACK ⭐ -->
  <!-- =============================== -->
  <div class="vertical-stack" style="margin-top: 200px; display: flex; flex-direction: column; gap: 20px;">

    <!-- Inside the Guild -->
    <div class="guild-btn" onclick="toggleDrop('drop1')">
      🛡️ Inside the Guild
      <span class="arrow">›</span>
    </div>
    <div id="drop1" class="dropdown-panel">
      <p>The chamber where your identity is forged.</p>
      <button class="enter-btn" onclick="go('inside-the-guild.html')">ENTER</button>
    </div>

    <!-- Training Hall -->
    <div class="guild-btn" onclick="toggleDrop('drop2')">
      ⚔️ Training Hall
      <span class="arrow">›</span>
    </div>
    <div id="drop2" class="dropdown-panel">
      <p>Your path of mastery begins here.</p>
      <button class="enter-btn" onclick="go('training-hall.html')">ENTER</button>
    </div>

    <!-- Guild Family -->
    <div class="guild-btn" onclick="toggleDrop('drop3')">
      🏛️ Guild Family
      <span class="arrow">›</span>
    </div>
    <div id="drop3" class="dropdown-panel">
      <p>The shared hall of all members — your brothers and sisters.</p>
      <button class="enter-btn" onclick="go('guild-family.html')">ENTER</button>
    </div>

  </div>

  <!-- LOGIC -->
  <script>
    function toggleDrop(id) {
      document.getElementById(id).classList.toggle("open");
    }

    function go(page) {
      window.location.href = page;
    }
  </script>

</body>
</html>
