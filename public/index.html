<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>The Guild</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />

  <link rel="icon" type="image/png" href="/assets/image/the-guild.png" />
  <link rel="apple-touch-icon" href="/assets/image/the-guild.png" />

  <link href="https://fonts.googleapis.com/css2?family=Uncial+Antiqua&family=Marcellus+SC&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="/assets/css/index.css">
</head>

<body style="
  background:url('/assets/image/guild-win.jpg') no-repeat center center fixed;
  background-size: 100% 100%;
  margin:0;
  padding:0;
">

  <nav class="top-nav">
    <a onclick="go('/pages/colosseum.html')">The Colosseum</a>
    <a onclick="go('/pages/guild-entry.html')">Inner Hall</a>
    <a onclick="go('/pages/second-thoughts.html')">Why Join the Guild</a>
  </nav>

  <header class="guild-header">
    <h1 class="guild-title">The Guild Brotherhood &amp; Sisterhood</h1>
  </header>

  <section class="login-panel">
    <h2 class="panel-title">Member Login</h2>

    <input id="loginUser" type="text" placeholder="Username">
    <input id="loginPass" type="password" placeholder="Password">

    <button class="login-btn" onclick="login()">Enter the Guild</button>

    <p class="new-here">
      New to the Guild?<br>
      <a onclick="go('/pages/guild-entry.html')">Enter the Inner Hall</a>
    </p>
  </section>

  <section class="quick-links">
    <button class="login-btn" onclick="go('/pages/colosseum.html')">🏛️ The Colosseum</button>
    <button class="login-btn" onclick="go('/pages/guild-entry.html')">🜁 Inner Hall</button>
    <button class="login-btn" onclick="go('/pages/second-thoughts.html')">✨ Why Join the Guild</button>
  </section>

  <script src="/assets/js/index.js" defer></script>

</body>
</html>
