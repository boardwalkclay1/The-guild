<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Guild Entry – $50 Contribution</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<link rel="stylesheet" href="/public/pages/guild-entry.css">
<script src="/public/pages/guild-entry.js" defer></script>

<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Uncial+Antiqua&display=swap" rel="stylesheet">
</head>

<body data-bg="/public/image/Tributum.jpg">

<h1 class="guild-title">Guild Entry</h1>

<div class="entry-container">
  <p>Your contribution unlocks the Guild for 30 days.</p>
  <p><strong>Amount: $50</strong></p>

  <img class="qr" src="/public/image/Entry-qrcode.png" alt="Guild Entry QR Code">

  <a id="paypalBtn" class="btn" target="_blank">Pay with PayPal</a>

  <p>Create your Guild login:</p>

  <input id="username" type="text" placeholder="Create username">
  <input id="password" type="password" placeholder="Create password">

  <button class="btn" onclick="beginEntry()">Continue</button>

  <div class="doubt-link">
    Having second thoughts?<br>
    <a onclick="go('/public/pages/having-second-thoughts.html')">See why the Guild changes lives</a>
  </div>
</div>

</body>
</html>
