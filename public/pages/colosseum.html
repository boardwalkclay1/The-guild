<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>The Colosseum</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link rel="stylesheet" href="colosseum.css">
  <script src="colosseum.js" defer></script>
</head>

<body>

  <!-- Background image -->
  <div id="scene-bg"></div>

  <!-- Black overlay -->
  <div id="scene-overlay"></div>

  <!-- Ember particles -->
  <div id="ember-layer"></div>

  <!-- Text container -->
  <div id="scene-text"></div>

  <!-- Continue button -->
  <button id="scene-next">Continue</button>

  <!-- Audio -->
  <audio id="audio-ambience" src="audio/arena-ambience.mp3" loop></audio>
  <audio id="audio-rumble" src="audio/dragon-rumble.mp3"></audio>
  <audio id="audio-door" src="audio/door-low-boom.mp3"></audio>

</body>
</html>
